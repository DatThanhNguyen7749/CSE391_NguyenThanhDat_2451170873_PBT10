<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👥 User Directory - Quản lý Người dùng</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- HEADER -->
        <header>
            <h1>👥 User Directory</h1>
            <p>Quản lý danh sách người dùng với CRUD Operations</p>
        </header>

        <!-- THANH CÔNG CỤ: Tìm kiếm + Nút thêm -->
        <div class="toolbar">
            <!-- Ô tìm kiếm -->
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Tìm kiếm theo tên hoặc email...">
            </div>

            <!-- Nút thêm user mới -->
            <button id="addUserBtn" class="btn btn-primary">
                ➕ Thêm User
            </button>
        </div>

        <!-- LOADING STATE - Skeleton loader -->
        <div id="loading" class="loading">
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        </div>

        <!-- ERROR STATE -->
        <div id="error" class="error hidden">
            <span class="error-icon">❌</span>
            <p id="errorMessage">Có lỗi xảy ra</p>
            <button id="retryBtn" class="btn">🔄 Thử lại</button>
        </div>

        <!-- DANH SÁCH USERS -->
        <div id="userList" class="user-list hidden">
            <!-- Các user card sẽ được render bằng JavaScript -->
        </div>

        <!-- THÔNG BÁO (Toast) -->
        <div id="toast" class="toast hidden">
            <span id="toastMessage">Thông báo</span>
        </div>
    </div>

    <!-- MODAL FORM - Dùng chung cho thêm và sửa user -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm User Mới</h2>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>

            <form id="userForm">
                <!-- Input ẩn để lưu ID khi edit -->
                <input type="hidden" id="userId">

                <div class="form-group">
                    <label for="userName">Họ và tên *</label>
                    <input type="text" id="userName" name="name" required placeholder="Nhập họ và tên">
                </div>

                <div class="form-group">
                    <label for="userEmail">Email *</label>
                    <input type="email" id="userEmail" name="email" required placeholder="example@email.com">
                </div>

                <div class="form-group">
                    <label for="userPhone">Số điện thoại</label>
                    <input type="tel" id="userPhone" name="phone" placeholder="0123 456 789">
                </div>

                <div class="form-group">
                    <label for="userCompany">Công ty</label>
                    <input type="text" id="userCompany" name="company" placeholder="Tên công ty">
                </div>

                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="btn btn-secondary">
                        Hủy
                    </button>
                    <button type="submit" class="btn btn-primary">
                        💾 Lưu
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- CONFIRM DIALOG - Xác nhận xóa -->
    <div id="confirmDialog" class="modal hidden">
        <div class="modal-content confirm-content">
            <div class="confirm-icon">⚠️</div>
            <h3>Xác nhận xóa</h3>
            <p id="confirmMessage">Bạn có chắc muốn xóa user này?</p>
            <div class="confirm-actions">
                <button id="confirmCancelBtn" class="btn btn-secondary">Hủy</button>
                <button id="confirmDeleteBtn" class="btn btn-danger">🗑️ Xóa</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
